name: Refresh Profile

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Ensure Markers
        run: |
          if ! grep -q "<code><b>LATEST_HEARTBEAT:</b>" README.md; then
            echo '<code><b>LATEST_HEARTBEAT:</b> **PLACEHOLDER**</code>' >> README.md
          fi
          if ! grep -q "Automated synchronization executed at <b>" README.md; then
            echo 'Automated synchronization executed at <b>PLACEHOLDER</b>' >> README.md
          fi

      - name: Update Timestamp
        run: |
          DEPLOYED_ON=$(date -u +'%Y-%m-%d %H:%M UTC')
          echo "DEPLOYED_ON=$DEPLOYED_ON" >> $GITHUB_ENV
          sed -i "s|<code><b>LATEST_HEARTBEAT:</b> \*\*.*\*\*|<code><b>LATEST_HEARTBEAT:</b> **$DEPLOYED_ON**|" README.md
          sed -i "s|Automated synchronization executed at <b>.*</b>|Automated synchronization executed at <b>$DEPLOYED_ON</b>|" README.md

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Profile Autodeploy: $DEPLOYED_ON" || echo "No changes"
          git push
